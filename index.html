<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Mark Search</h1>
        <div class="search-box">
            <input type="text" id="studentID" placeholder="ID നമ്പർ നൽകുക (उदा: B210250)">
            <button onclick="findResult()">Search</button>
        </div>
        <div id="resultCard" class="result-card" style="display: none;">
            <h2 id="resName"></h2>
            <p>ID: <span id="resID"></span></p>
            <div class="marks-grid">
                <div class="mark-item">Mark 1: <b id="m1"></b></div>
                <div class="mark-item">Mark 2: <b id="m2"></b></div>
                <div class="mark-item">Mark 3: <b id="m3"></b></div>
            </div>
            <div class="total-box">
                Total Mark: <span id="resTotal"></span>
            </div>
        </div>
        <p id="errorMsg" style="color: red; display: none;">ക്ഷമിക്കണം, ഈ ഐഡി ലഭ്യമല്ല!</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
